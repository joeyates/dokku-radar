global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "dokku_radar"
    metric_relabel_configs:
      - source_labels: [__name__]
        regex: "dokku_ssl_cert_expiry_timestamp"
        action: drop
    static_configs:
      - targets: ["dokku-radar.web.1:9110"]

  - job_name: "dokku_radar_ssl"
    scrape_interval: 1d
    metric_relabel_configs:
      - source_labels: [__name__]
        regex: "dokku_ssl_cert_expiry_timestamp"
        action: keep
    static_configs:
      - targets: ["dokku-radar.web.1:9110"]

  # Uncomment to scrape node_exporter for host-level metrics.
  # Deploy node_exporter as a Dokku app on the same monitoring network.
  # - job_name: "node_exporter"
  #   static_configs:
  #     - targets: ["node-exporter.web.1:9100"]
